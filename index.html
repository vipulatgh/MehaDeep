<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wedding Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fdf6f0;
      text-align: center;
      color: #333;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .names {
      font-size: 2rem;
      margin: 20px 0;
      color: #b76e79;
    }

    .details {
      font-size: 1.1rem;
      margin: 15px 0;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: #777;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #b76e79;
      color: white;
      border-radius: 25px;
      text-decoration: none;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>You're Invited 💍</h1>

    <div class="names">
      Vipul ❤️ Partner Name
    </div>

    <div class="details">
      Together with their families,<br>
      request the pleasure of your presence
    </div>

    <div class="card">
      <h2>Wedding Ceremony</h2>
      <p>📅 6 February 2026</p>
      <p>⏰ 2:30 PM</p>
      <p>📍 Venue Name, City</p>
    </div>

    <div class="card">
      <h2>Reception</h2>
      <p>📅 6 February 2026</p>
      <p>⏰ 12:30 PM</p>
      <p>📍 Venue Name, City</p>
    </div>

    <a class="btn" href="https://maps.google.com" target="_blank">
      View Location
    </a>

    <div class="footer">
      #JabVMetP
    </div>

  </div>

</body>
</html>
