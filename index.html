<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meha ❤️ Deep</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('https://images.unsplash.com/photo-1606813907291-d86efa9b94db?q=80&w=1200') center/cover no-repeat;
  font-family: 'Poppins', sans-serif;
}

/* 9:16 container */
.story {
  width: 360px;
  height: 640px;
  position: relative;
}

/* Glass card */
.card {
  position: absolute;
  inset: 0;
  border-radius: 30px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 30px;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Heading */
.heading {
  text-align: center;
  font-family: 'Playfair Display', serif;
  letter-spacing: 2px;
  font-size: 18px;
}

/* Names */
.names {
  text-align: center;
  font-size: 28px;
  font-family: 'Playfair Display', serif;
  margin-top: 10px;
}

/* Countdown */
.countdown {
  text-align: center;
  margin: 20px 0;
}

.time {
  font-size: 28px;
  font-weight: 600;
}

/* Details */
.details {
  text-align: center;
  font-size: 13px;
  opacity: 0.9;
}

/* Buttons */
.buttons {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.6);
  text-align: center;
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="story">
  <div class="card">

    <div>
      <div class="heading">A NEW CHAPTER BEGINS</div>
      <div class="names">Meha & Deep</div>
    </div>

    <div class="countdown">
      <div id="timer" class="time">Loading...</div>
    </div>

    <div class="details">
      Tuesday • 2:31 PM <br>
      Oswal Center, Jamnagar, Gujarat
    </div>

    <div class="buttons">
      <div class="btn">Team Groom</div>
      <div class="btn">Team Bride</div>
    </div>

  </div>
</div>

<script>
// SET YOUR WEDDING DATE HERE
const weddingDate = new Date("Feb 6, 2026 14:31:00").getTime();

const timer = document.getElementById("timer");

setInterval(() => {
  const now = new Date().getTime();
  const diff = weddingDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);

  timer.innerHTML = `${days}d ${hours}h ${minutes}m`;

}, 1000);
</script>

</body>
</html>
