<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meha ❤️ Deep Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins';
background:linear-gradient(135deg,#0a1931,#0f3460);
color:#d4af37;
overflow-x:hidden;
}

/* ===================== */
/* 💌 3D ENVELOPE */
/* ===================== */
.intro{
position:fixed;
width:100%;
height:100%;
background:#0a1931;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
perspective:1000px;
}

.envelope{
width:220px;
height:140px;
position:relative;
cursor:pointer;
transform-style:preserve-3d;
}

.flap{
position:absolute;
width:100%;
height:100%;
background:gold;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
z-index:2;
}

.body{
position:absolute;
width:100%;
height:100%;
background:#fff;
border:2px solid gold;
}

.letter{
position:absolute;
width:90%;
height:90%;
background:#fff;
top:5%;
left:5%;
transform:translateY(50px);
opacity:0;
transition:1s;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-size:14px;
}

/* open animation */
.open .flap{
transform:rotateX(180deg);
}

.open .letter{
transform:translateY(-120px);
opacity:1;
}

/* ===================== */
/* HERO */
/* ===================== */
.hero{
display:none;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.glass{
width:90%;
max-width:400px;
height:85vh;
background:rgba(255,255,255,0.05);
border:1px solid gold;
border-radius:30px;
padding:25px;
display:flex;
flex-direction:column;
justify-content:space-between;
text-align:center;
}

.names{
font-family:'Great Vibes';
font-size:36px;
color:#ffd700;
}

/* countdown */
.countdown-box{
border:1px solid gold;
padding:10px;
border-radius:15px;
}

.countdown{
display:flex;
justify-content:space-around;
}

.time{font-size:18px;}
.label{font-size:10px;}

/* ===================== */
/* CONFETTI */
/* ===================== */

/* burst particles */
.confetti{
position:fixed;
width:6px;
height:6px;
bottom:0;
border-radius:50%;
animation:burst 1s ease-out forwards;
}

@keyframes burst{
0%{transform:translate(0,0);}
100%{transform:translate(var(--x),var(--y));}
}

/* falling particles */
.fall{
position:fixed;
top:-10px;
border-radius:50%;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* ===================== */
/* EVENTS + SECTIONS */
/* ===================== */

.section{padding:40px 20px;text-align:center;}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(212,175,55,0.3);
padding:15px;
border-radius:15px;
margin:15px 0;
cursor:pointer;
}

.hidden{display:none;}

ul{list-style:none;text-align:left;}
li{margin:5px 0;}

a{color:#ffd700;}

</style>
</head>

<body>

<!-- 💌 INTRO -->
<div class="intro" id="intro">
<div class="envelope" onclick="openInvite(this)">
<div class="flap"></div>
<div class="body"></div>
<div class="letter">You're Invited 💌</div>
</div>
</div>

<!-- HERO -->
<div class="hero" id="main">

<div class="glass">
<div class="names">Meha ❤️ Deep</div>

<div class="countdown-box">
<div class="countdown">
<div><div id="d" class="time">0</div><div class="label">D</div></div>
<div><div id="h" class="time">0</div><div class="label">H</div></div>
<div><div id="m" class="time">0</div><div class="label">M</div></div>
<div><div id="s" class="time">0</div><div class="label">S</div></div>
</div>
</div>

<div>
📍 <a href="https://maps.app.goo.gl/hWsrds8oxtGychpZA?g_st=ac" target="_blank">
Oswal Center, Jamnagar
</a>
</div>

<div style="margin-top:10px;">
<button onclick="blast()">Team Groom</button>
<button onclick="blast()">Team Bride</button>
</div>

</div>
</div>

<!-- EVENTS -->
<div class="section" id="events" style="display:none;">
<h2>Wedding Events</h2>

<div class="card" onclick="toggle(this)">
<h3>🎊 Mandap</h3>
<div class="hidden">
<ul>
<li>📅 22 June</li>
<li>⏰ 2:30 PM</li>
<li>📍 <a href="https://maps.app.goo.gl/hWsrds8oxtGychpZA">Location</a></li>
</ul>
</div>
</div>

</div>

<script>

/* 💌 OPEN ANIMATION */
function openInvite(el){
el.classList.add("open");

setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="flex";
document.getElementById("events").style.display="block";
},1200);
}

/* 🎊 CONFETTI */
function blast(){

/* burst from corners */
for(let i=0;i<100;i++){
let c=document.createElement("div");
c.className="confetti";

let side=Math.random()<0.5?0:window.innerWidth;
c.style.left=side+"px";

let x=(Math.random()*300-150);
let y=-(Math.random()*500+200);

c.style.setProperty('--x',x+'px');
c.style.setProperty('--y',y+'px');

c.style.background=["gold","white","pink"][Math.floor(Math.random()*3)];

document.body.appendChild(c);

setTimeout(()=>c.remove(),1000);
}

/* slow falling particles */
for(let i=0;i<300;i++){
let f=document.createElement("div");
f.className="fall";

f.style.left=Math.random()*100+"vw";
f.style.width=f.style.height=(Math.random()*6+2)+"px";

f.style.background=["gold","#ffd700","white"][Math.floor(Math.random()*3)];
f.style.opacity=Math.random();

f.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),10000);
}
}

/* countdown */
const date=new Date("June 23, 2026 16:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let diff=date-now;

d.innerHTML=Math.floor(diff/(1000*60*60*24));
h.innerHTML=Math.floor((diff/(1000*60*60))%24);
m.innerHTML=Math.floor((diff/(1000*60))%60);
s.innerHTML=Math.floor((diff/1000)%60);
},1000);

/* toggle */
function toggle(card){
card.querySelector(".hidden").classList.toggle("hidden");
}

</script>

</body>
</html>
